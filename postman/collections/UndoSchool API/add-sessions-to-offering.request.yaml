$kind: http-request
method: POST
url: '{{baseUrl}}/api/teachers/{{teacherId}}/offerings/{{offeringId}}/sessions'
order: 7000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    [
      {
        "startTime": "{{startTime}}",
        "endTime": "{{endTime}}"
      }
    ]
