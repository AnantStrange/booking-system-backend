spring.application.name=booking-system

# Database Connection (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/booking_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC 
# spring.datasource.url=jdbc:mariadb://localhost:3306/booking_system
spring.datasource.username=anant
spring.datasource.password=anant
spring.datasource.hikari.connectionTimeout=60000

# JPA
spring.jpa.hibernate.ddl-auto=validate
# spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
# spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
# logging.level.org.flywaydb=DEBUG

# Server
server.port=8080

